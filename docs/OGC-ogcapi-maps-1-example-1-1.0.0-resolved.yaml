    tileMatrixSet_tileMatrices:
      required:
      - cellSize
      - id
      - matrixHeight
      - matrixWidth
      - pointOfOrigin
      - scaleDenominator
      - tileHeight
      - tileWidth
      type: object
      properties:
        title:
          type: string
          description: "Title of this tile matrix, normally used for display to a human"
