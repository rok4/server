          - $ref: "#/components/schemas/2DPoint"
        tileWidth:
          multipleOf: 1
          minimum: 1
          type: number
          description: Width of each tile of this tile matrix in pixels
          format: integer
        tileHeight:
          multipleOf: 1
          minimum: 1
          type: number
          description: Height of each tile of this tile matrix in pixels
          format: integer
        matrixHeight:
