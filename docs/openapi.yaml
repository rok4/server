  ######################################### ADMIN

  /admin/on:
    put:
      tags:
      - Administration
      summary: Active les services
      description: On active la réponse aux appels sur les routes globales et de consultation
      operationId: admin_turn_on

      responses:
        204:
          description: Activation des services réussie

  /admin/off:
    put:
      tags:
      - Administration
      summary: Désactive les services
      description: |
        On désactive la réponse aux appels sur les routes globales et de consultation (réponse d'un 503 systématique). 
        On répond toujours aux API admin et de santé.
      operationId: admin_turn_off

      responses:
        204:
          description: Désactivation des services réussie

  /admin/layers/{layername}:
    post:
      tags:
      - Administration
      summary: Création d'une nouvelle couche
      operationId: admin_create_layer
      parameters:
        - name: layername
          required: true
          in: path
          description: Identifiant de la nouvelle couche
          schema:
            type: string


      requestBody:
        content:  
          application/json:
            schema:
              $ref: '#/components/schemas/admin_layer'

      responses:
        204:
          description: Couche créée
        400:
          description: Paramètre manquant ou erroné
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin_error'
        409:
          description: Couche déjà existante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin_error'
    put:
      tags:
      - Administration
      summary: Modification d'une couche
      description: L'identifiant de la couche doit rester le même
      operationId: admin_update_layer
      parameters:
        - name: layername
          required: true
          in: path
          description: Identifiant de la couche à modifier
          schema:
            type: string

      requestBody:
        content:  
          application/json:
            schema:
              $ref: '#/components/schemas/admin_layer'

      responses:
        204:
          description: Couche modifiée
        400:
          description: Paramètre manquant ou erroné
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin_error'
        404:
          description: Couche inexistante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin_error'

    delete:
      tags:
      - Administration
      summary: Suppression d'une couche
      operationId: admin_delete_layer
      parameters:
        - name: layername
          required: true
          in: path
          description: Identifiant de la couche à supprimer
          schema:
            type: string

      responses:
        204:
          description: Couche supprimée
        404:
          description: Couche inexistante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/admin_error'

components:
  schemas:

    common_error:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer

    wms_error:
      xml:
        name: 'ServiceExceptionReport'
      type: object
      additionalProperties: false
      properties:
        ServiceException:
          type: object
          properties:
            code:
              type: string
              xml:
                attribute: true

    wms_capabilities:
      xml:
        name: 'WMS_Capabilities'
      type: object
      additionalProperties: false

    wmts_error:
      xml:
        name: 'ExceptionReport'
      type: object
      additionalProperties: false
      properties:
        Exception:
          type: object
          properties:
            exceptionCode:
              type: string
              xml:
                attribute: true

    wmts_capabilities:
      xml:
        name: 'Capabilities'
      type: object
      additionalProperties: false

    tms_error:
      xml:
        name: 'TileMapServerError'
      type: object
      additionalProperties: false
      properties:
        Message:
          type: string

    tms_capabilities:
      xml:
        name: 'WMS_Capabilities'
      type: object
      additionalProperties: false

    tms_layer:
      xml:
        name: 'WMS_Capabilities'
      type: object
      additionalProperties: false

    tms_metadata_json:
      xml:
        name: 'WMS_Capabilities'
      type: object
      additionalProperties: false

    tms_gdal_xml:
      xml:
        name: 'WMS_Capabilities'
      type: object
      additionalProperties: false

    ogcapi_metadata:
      type: object
      properties:
        href:
          type: string
        rel:
          type: string
          enum: ["data", "self"]
        type:
          type: string
        title:
          type: string

    ogcapi_bbox:
      type: object
      properties:
        spatial:
          type: object
          properties:
            crs:
              type: string
              example: "http://www.opengis.net/def/crs/OGC/1.3/CRS84"
            bbox:
              type: array
              items:
                type: array
                items: 
                  type: number
                minItems: 4
                maxItems: 4
                example: [-5, 40, 5, 50]

    ogcapi_link:
      type: object
      properties:
        href:
          type: string
        rel:
          type: string
          enum: ["describedby", "self", "item"]
        type:
          type: string
        title:
          type: string


    ogcapi_get_landing_page:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        links:
          type: array
          items:
            $ref: '#/components/schemas/ogcapi_metadata'

    ogcapi_get_conformance:
      type: object
      properties:
        conformsTo:
          type: array
          items:
            type: string
            format: uri

    ogcapi_collections:
      type: object
      properties:
        links:
          type: array
          items:
            $ref: '#/components/schemas/ogcapi_link'
        collections:
          type: array
          items:
            $ref: '#/components/schemas/ogcapi_collection'
        numberMatched:
          type: integer
          description: Nombre total de couches correspondantes à la requête
          example: 1
        numberReturned:
          type: integer
          description: Nombre de couches correspondantes à la requête retournées
          example: 1

    ogcapi_collection:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        extent:
          $ref: '#/components/schemas/ogcapi_bbox'
        links:
          type: array
          items:
            $ref: '#/components/schemas/ogcapi_link'
        crs:
          type: array
          items:
            type: string
        dataType:
          type: string
          enum: ["map", "vector"]
        mapTiles:
          type: boolean
        dataTiles:
          type: boolean
        minCellSize:
          type: number
        maxCellSize:
          type: number

    ogcapi_styles:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        links:
          type: array
          items:
            $ref: '#/components/schemas/ogcapi_link'
        styles:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              links:
                type: array
                items:
                  $ref: '#/components/schemas/ogcapi_link'

    ogcapi_tiles_tilesets:
      type: object
      properties:
        links:
          type: array
          items:
            $ref: '#/components/schemas/ogcapi_link'
        tilesets:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              dataType:
                type: string
                enum: ["map", "vector"]
              crs:
                type: string
              tileMatrixSetURI:
                type: string
              links:
                type: array
                items:
                  $ref: '#/components/schemas/ogcapi_link'

    ogcapi_tiles_tileset:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        crs:
          type: string
        tileMatrixSetURI:
          type: string
        dataType:
          type: string
          enum: ["map", "vector"]
        links:
          type: array
          items:
            $ref: '#/components/schemas/ogcapi_link'
        tileMatrixSetLimits:
          type: array
          items:
            type: object
            properties:
              tileMatrix:
                type: string
              minTileRow:
                type: integer
              maxTileRow:
                type: integer
              minTileCol:
                type: integer
              maxTileCol:
                type: integer

    ogcapi_tilematrixsets:
      type: object
      properties:
        tilematrixsets:
          type: object
          properties:
            id:
              type: string
            title:
              type: string
            crs:
              type: string
            links:
              type: array
              items:
                $ref: '#/components/schemas/ogcapi_link'

    ogcapi_api_params:
      type: object
      properties:
        type:
          type: string
          enum:
            - "enum"
        enum:
          type: array
          items:
            type: string

    ogcapi_tilematrixset:
      type: object
      properties:
          id:
            type: string
          title:
            type: string
          description:
            type: string
          keywords:
            type: array
            items: 
              type: string
          crs:
            type: string
          tileMatrices:
            type: array
            items:
              type: object
              properties:
                id:
                  type: string
                cellSize:
                  type: number
                cornerOfOrigin:
                  type: string
                  enum: ["topLeft"]
                pointOfOrigin:
                  type: array
                  items:
                    type: number
                  minItems: 2
                  maxItems: 2
                tileWidth:
                  type: integer
                tileHeight:
                  type: integer
                matrixHeight:
                  type: integer
                matrixWidth:
                  type: integer


    ogcapi_error:
      type: object
      additionalProperties: false
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer

    # ogc_tilematrixsets:
    #   type: object
    #   properties:
    #     tilematrixsets:
    #       type: array
    #       items:
    #         $ref: 'https://raw.githubusercontent.com/opengeospatial/ogcapi-tiles/master/openapi/schemas/tms/tileMatrixSet-item.yaml'

    # ogc_tilematrixsets_id:
    #   type: object
    #   allOf:
    #     - $ref: 'https://raw.githubusercontent.com/opengeospatial/ogcapi-tiles/master/openapi/schemas/tms/tileMatrixSet.yaml'

    healthcheck:
      type: object
      properties:
        status:
          type: string
          enum: ['OK', 'DISABLED']
        version:
          type: string
        pid:
          type: integer
        time:
          type: integer

    health_info:
      type: object
      properties:
        layers:
          type: array
          items:
            type: string
        tms:
          type: array
          items:
            type: string
        styles:
          type: array
          items:
            type: string
    
    health_threads:
      type: object
      properties:
        number:
          type: number
        threads:
          type: array
          items:
            type: object
            properties:
              pid:
                type: integer
              time:
                type: integer
              duration: 
                type: string
              count:
                type: number
              status:
                type: string
                enum: ['RUNNING', 'PENDING', 'AVAILABLE']

    health_depends:
      type: object
      properties:
        storage:
          type: object
          properties:
            file: 
              type: integer
            s3: 
              type: integer
            swift: 
              type: integer
            ceph: 
              type: integer
          required:
            - file
            - s3
            - swift
            - ceph

    health_error:
      type: object
      properties:
        code: 
          type: integer
        message: 
          type: string
    
    admin_error:
      type: object
      additionalProperties: false
      properties:
        error_status:
          type: string
        error_message:
          type: string

    admin_layer:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
        abstract:
          type: string
        keywords:
          type: array
          items: 
            type: string
        styles:
          type: array
          minItems: 1
          items: 
            type: string
        bbox:
          type: object
          required:
            - east
            - west
            - north
            - south
          properties: 
            east:
              type: number
            west:
              type: number
            north:
              type: number
            south:
              type: number
        attribution:
          type: object
          properties:
            title:
              type: string
            url:
              type: string
            logo:
              type: object
              properties:
                format:
                  type: string
                url:
                  type: string
                width:
                  type: integer
                height:
                  type: integer
              required:
                - format
                - url
                - width
                - height
          required:
            - title
            - url
            
        metadata:
          type: array
          items: 
            type: object
            properties:
              format:
                type: string
              url:
                type: string
              type:
                type: string
            required:
              - format
              - url
              - type

        pyramids:
          type: array
          minItems: 1
          items: 
            type: object
            properties:
              path:
                type: string
              bottom_level:
                type: string
              top_level:
                type: string

            required:
              - path
              - bottom_level
              - top_level

        resampling:
          type: string
          enum:
            - nn
            - linear
            - bicubic
            - lanczos
            - lanczos_2
            - lanczos_3
            - lanczos_4

        extra_crs:
          type: array
          items: 
            type: string

        extra_tilematrixsets:
          type: array
          items: 
            type: string

        get_feature_info:
          oneOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - PYRAMID
              required:
                - type
            - type: object
              properties:
                type:
                  type: string
                  enum:
                    - EXTERNALWMS
                url:
                  type: string
                layers:
                  type: string
                query_layers:
                  type: string
                extra_query_params:
                  type: string
              required:
                - type
                - url
                - layers
                - query_layers
            
        wms:
          type: object
          properties:
            pyramid:
              type: boolean
            
        wmts:
          type: object
          properties:
            pyramid:
              type: boolean
            
        tms:
          type: object
          properties:
            pyramid:
              type: boolean
            
        tiles:
          type: object
          properties:
            pyramid:
              type: boolean

      required:
        - title
        - abstract
        - pyramids

