openapi: 3.0.3
info:
  title: Serveur ROK4 WMS / WMTS / TMS
  description: Le serveur implémente les standards ouverts de l’Open Geospatial Consortium (OGC) WMS 1.3.0 et WMTS 1.0.0, ainsi que le TMS (Tile Map Service).
  version: "__version__"
servers:
- url: https://tuiles.ign.fr/rok4

tags:
- name: Santé du serveur
  description: Informations de santé sur les serveur 
- name: Web Map Tile Service
  description: Diffusion de tuiles raster et vecteur selon le standard OGC WMTS
  externalDocs:
    description: Spécifications OGC
    url: https://www.ogc.org/standard/wmts/
- name: Web Map Service
  description: Diffusion d'images raster selon le standard OGC WMS
  externalDocs:
    description: Spécifications OGC
    url: https://www.ogc.org/standard/wms/
- name: Tile Map Service
  description: Diffusion de tuiles raster et vecteur selon la convention TMS
  externalDocs:
    description: Spécifications OSGeo
    url: https://wiki.osgeo.org/wiki/Tile_Map_Service_Specification
- name: OGC API
  description: Diffusion de données vecteur et raster selon les standards Tiles et Maps de l'API OGC
  externalDocs:
    description: Spécifications OGC
    url: https://ogcapi.ogc.org/
- name: Administration
  description: API d'ajout et de suppression de couches disponibles

paths:

  ######################################### SANTÉ DU SERVEUR
  
  /healthcheck:
    get:
      tags:
      - Santé du serveur
      summary: Récupère les informations générales du serveur
      responses:
        200:
          description: Statut, version, identifiant de processus et date de lancement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/healthcheck'
                
  /healthcheck/info:
    get:
      tags:
      - Santé du serveur
      summary: Récupère la liste des identifiants des couches, TMS et styles chargés
      responses:
        200:
          description: Liste des identifiants des couches, TMS et styles chargés
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_info"
                
  /healthcheck/threads:
    get:
      tags:
      - Santé du serveur
      summary: Récupère les informations sur chaque thread
      responses:
        200:
          description: Liste des identifiants, statuts, nombre et temps de traitement des requête pour chaque thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_threads"
  
  /healthcheck/depends:
    get:
      tags:
      - Santé du serveur
      summary: Récupère le compte des contextes de stockage utilisés
      responses:
        200:
          description: Nombre de contexte de stockage utilisés fichier, Swift, S3 et Ceph 
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/health_depends"

  ######################################### WMS

  /wms?SERVICE=WMS&REQUEST=GetCapabilities&VERSION=1.3.0:
    get:
      tags:
      - Web Map Service
      summary: Récupère la liste des couches disponibles selon le service WMS
      operationId: wms_get_capabilities
      x-query: "{&parameters*}" # changed the prefix to &
      responses:
        200:
          description: Liste des couches disponibles selon le service WMS
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/wms_capabilities'

  /wms?SERVICE=WMS&REQUEST=GetMap&VERSION=1.3.0:
    get:
      tags:
      - Web Map Service
      summary: Télécharge une image
      operationId: wms_get_map
      x-query: "{&parameters*}" # changed the prefix to &
      parameters:

        - name: LAYERS
          required: true
          in: query
          description: liste des couches demandées
          schema:
            type: array
            minItems: 1
            items:
              type: string
            example:
              - SCAN1000
              - BDORTHO
          explode: false

        - name: WIDTH
          required: true
          in: query
          description: largeur de l'image demandée
          schema:
            type: integer
            example:
              256

        - name: HEIGHT
          required: true
          in: query
          description: hauteur de l'image demandée
          schema:
            type: integer
            example:
              256

        - name: CRS
          required: true
          in: query
          description: système de coordonnées d'interrogation
          schema:
            type: string
            example:
              EPSG:3857

        - name: FORMAT
          required: true
          in: query
          description: format de la réponse
          schema:
            type: string
            example:
              image/jpeg

        - name: BBOX
          required: true
          in: query
          description: rectangle englobant de l'image demandée
          schema:
            type: array
            minItems: 4
            maxItems: 4
            items:
              type: number
            example:
              - 450000
              - 560000
              - 455000
              - 565000
          explode: false

        - name: EXCEPTION
          required: false
          in: query
          description: format de la réponse
          schema:
            type: string
            enum:
              - XML
              - ""

        - name: STYLES
          required: true
          in: query
          description: liste des styles à appliqer aux couches demandées
          schema:
            type: array
            minItems: 1
            items:
              type: string
            example:
              - normal
              - normal
          explode: false

        - name: FILENAME
          required: false
          in: query
          description: nom du fichier à enregistrer (mis dans le content-disposition de la réponse, avec le mode attachment)
          schema:
            type: string

        - name: FORMAT_OPTIONS
          required: false
          in: query
          description: Options complémentaires de format
          schema:
            type: string

        - name: DPI
          required: false
          in: query
          description: Résolution pixel
          schema:
            type: integer
            example:
              90

      responses:
        400:
          description: Paramètre manquant ou erroné
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/wms_error'

        404:
          description: Pas de données
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/wms_error'

        200:
          description: Image demandée
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /wms?SERVICE=WMS&REQUEST=GetFeatureInfo&VERSION=1.3.0:
    get:
      tags:
      - Web Map Service
      summary: Demande des informations sur un pixel
      operationId: wms_get_feature_info
      x-query: "{&parameters*}" # changed the prefix to &
      
      parameters:

        - name: QUERY_LAYERS
          required: true
          in: query
          description: liste des couches dont on veut les informations
          schema:
            type: array
            minItems: 1
            items:
              type: string
            example:
              - SCAN1000
          explode: false

        - name: FEATURE_COUNT
          required: false
          in: query
          description: nombre maximum d'objets dont on veut les informations
          schema:
            type: integer
            example:
              10
            default:
              1

        - name: I
          required: true
          in: query
          description: colonne du pixel dont on veut les informations
          schema:
            type: integer
            example:
              123

        - name: J
          required: true
          in: query
          description: ligne du pixel dont on veut les informations
          schema:
            type: integer
            example:
              208

        - name: INFO_FORMAT
          required: true
          in: query
          description: format des informations retournées
          schema:
            type: string
            example:
              application/xml

        - name: LAYERS
          required: true
          in: query
          description: liste des couches demandées
          schema:
            type: array
            minItems: 1
            items:
              type: string
            example:
              - SCAN1000
              - BDORTHO
          explode: false

        - name: WIDTH
          required: true
          in: query
          description: largeur de l'image demandée
          schema:
            type: integer
            example:
              256

        - name: HEIGHT
          required: true
          in: query
          description: hauteur de l'image demandée
          schema:
            type: integer
            example:
              256

        - name: CRS
          required: true
          in: query
          description: système de coordonnées d'interrogation
          schema:
            type: string
            example:
              EPSG:3857

        - name: FORMAT
          required: true
          in: query
          description: format de la réponse
          schema:
            type: string
            example:
              image/jpeg

        - name: BBOX
          required: true
          in: query
          description: rectangle englobant de l'image demandée
          schema:
            type: array
            minItems: 4
            maxItems: 4
            items:
              type: number
            example:
              - 450000
              - 560000
              - 455000
              - 565000
          explode: false

        - name: EXCEPTION
          required: false
          in: query
          description: format de la réponse
          schema:
            type: string
            enum:
              - XML
              - ""

        - name: STYLES
          required: true
          in: query
          description: liste des styles à appliqer aux couches demandées
          schema:
            type: array
            minItems: 1
            items:
              type: string
            example:
              - normal
              - normal
          explode: false

        - name: FORMAT_OPTIONS
          required: false
          in: query
          description: Options complémentaires de format
          schema:
            type: string

        - name: DPI
          required: false
          in: query
          description: Résolution pixel
          schema:
            type: integer
            example:
              90

      responses:
        200:
          description: Informations sur le pixel
          content:
            application/xml:
              schema:
                type: string
        400:
          description: Paramètre manquant ou erroné
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/wms_error'

  ######################################### WMTS

  /wmts?SERVICE=WMTS&REQUEST=GetCapabilities&VERSION=1.0.0:
    get:
      tags:
      - Web Map Tile Service
      summary: Récupère la liste des couches disponibles selon le service WMTS
      operationId: wmts_get_capabilities
      x-query: "{&parameters*}" # changed the prefix to &
      responses:
        200:
          description: Liste des couches disponibles selon le service WMTS
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/wmts_capabilities'
        400:
          description: Paramètre manquant ou erroné
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/wmts_error'

  /wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0:
    get:
      tags:
      - Web Map Tile Service
      summary: Télécharge une tuile
      operationId: wmts_get_tile
      x-query: "{&parameters*}" # changed the prefix to &
      parameters:

        - name: LAYER
          required: true
          in: query
          description: couche demandée
          schema:
            type: string

        - name: TILEMATRIXSET
          required: true
          in: query
          description: Quadrillage d'interrogation
          schema:
            type: string

        - name: TILEMATRIX
          required: true
          in: query
          description: Niveau de la tuile demandée
          schema:
            type: string

        - name: TILEROW
          required: true
          in: query
          description: Ligne de la tuile demandée
          schema:
            type: integer

        - name: TILECOL
          required: true
          in: query
          description: Colonne de la tuile demandée
          schema:
            type: integer

        - name: FORMAT
          required: true
          in: query
          description: Format de la tuile demandée
          schema:
            type: string

        - name: STYLE
          required: true
          in: query
          description: Style à appliquer à la tuile demandée
          schema:
            type: string

        - name: FILENAME
          required: false
          in: query
          description: nom du fichier à enregistrer (mis dans le content-disposition de la réponse, avec le mode attachment)
          schema:
            type: string

      responses:
        400:
          description: Paramètre manquant ou erroné
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/wmts_error'

        404:
          description: Pas de données
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/wmts_error'

        200:
          description: Tuile demandée
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /wmts?SERVICE=WMS&REQUEST=GetFeatureInfo&VERSION=1.0.0:
    get:
      tags:
      - Web Map Tile Service
      summary: Demande des informations sur un pixel
      operationId: wmts_get_feature_info
      x-query: "{&parameters*}" # changed the prefix to &
      parameters:

        - name: INFOFORMAT
          required: true
          in: query
          description: Format des informations retournées
          schema:
            type: string

        - name: I
          required: true
          in: query
          description: colonne du pixel dont on veut les informations
          schema:
            type: integer
            example:
              123

        - name: J
          required: true
          in: query
          description: ligne du pixel dont on veut les informations
          schema:
            type: integer
            example:
              208

        - name: LAYER
          required: true
          in: query
          description: couche demandée
          schema:
            type: string

        - name: TILEMATRIXSET
          required: true
          in: query
          description: Quadrillage d'interrogation
          schema:
            type: string

        - name: TILEMATRIX
          required: true
          in: query
          description: Niveau de la tuile demandée
          schema:
            type: string

        - name: TILEROW
          required: true
          in: query
          description: Ligne de la tuile demandée
          schema:
            type: integer

        - name: TILECOL
          required: true
          in: query
          description: Colonne de la tuile demandée
          schema:
            type: integer

        - name: FORMAT
          required: true
          in: query
          description: Format de la tuile demandée
          schema:
            type: string

        - name: STYLE
          required: true
          in: query
          description: Style à appliquer à la tuile demandée
          schema:
            type: string

      responses:
        200:
          description: Informations sur le pixel
          content:
            application/xml:
              schema:
                type: string
        400:
          description: Paramètre manquant ou erroné
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/wmts_error'

  ######################################### TMS
  
  /tms/1.0.0:
    get:
      tags:
      - Tile Map Service
      summary: Récupère la liste des couches disponibles selon le service TMS
      operationId: tms_get_capabilities
      responses:
        200:
          description: Liste des couches disponibles selon le service TMS
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/tms_capabilities'
        400:
          description: Paramètre manquant ou erroné
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/tms_error'

  /tms/1.0.0/{layer}:
    get:
      tags:
      - Tile Map Service
      summary: Récupère les informations générales sur une couche
      operationId: tms_get_layer
      parameters:

        - name: layer
          required: true
          in: path
          description: couche demandée
          schema:
            type: string

      responses:
        200:
          description: Informations générales sur la couche
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/tms_layer'
        400:
          description: Paramètre manquant ou erroné
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/tms_error'

  /tms/1.0.0/{layer}/metadata.json:
    get:
      tags:
      - Tile Map Service
      summary: Récupère les métadonnées d'une couche au format JSON
      operationId: tms_get_metadata_json
      parameters:

        - name: layer
          required: true
          in: path
          description: couche demandée
          schema:
            type: string

      responses:
        200:
          description: Liste des couches disponibles selon le service TMS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tms_metadata_json'

        400:
          description: Paramètre manquant ou erroné
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/tms_error'

  /tms/1.0.0/{layer}/gdal.xml:
    get:
      tags:
      - Tile Map Service
      summary: Récupère le descripteur de couche GDAL
      operationId: tms_get_gdal_xml
      parameters:

        - name: layer
          required: true
          in: path
          description: couche demandée
          schema:
            type: string

      responses:
        200:
          description: Descripteur GDAL de la couche
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/tms_gdal_xml'

        400:
          description: Paramètre manquant ou erroné
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/tms_error'

  /tms/1.0.0/{layer}/{level}/{column}/{row}.{extension}:
    get:
      tags:
      - Tile Map Service
      summary: Télécharge une tuile
      operationId: wmts_get_tile
      parameters:

        - name: layer
          required: true
          in: path
          description: couche demandée
          schema:
            type: string

        - name: level
          required: true
          in: path
          description: niveau de la tuile demandée
          schema:
            type: string

        - name: column
          required: true
          in: path
          description: colonne de la tuile demandée
          schema:
            type: integer

        - name: row
          required: true
          in: path
          description: ligne de la tuile demandée
          schema:
            type: integer

        - name: extension
          required: true
          in: path
          description: extension de la tuile demandée
          schema:
            type: string

        - name: filename
          required: false
          in: query
          description: nom du fichier à enregistrer (mis dans le content-disposition de la réponse, avec le mode attachment)
          schema:
            type: string
      responses:
        400:
          description: Paramètre manquant ou erroné
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/tms_error'

        404:
          description: Pas de données
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/tms_error'

        200:
          description: Tuile demandée
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  ######################################### OGC API

  /ogcapi:
    get:
      tags:
      - OGC API
      summary: Retourne la page d'accueil du service OGC API
      operationId: ogcapi_get_landing_page
      parameters:
        - name: f
          required: false
          in: query
          description: format de sortie demandé
          schema:
            type: string
            enum: ['json']
      responses:
        200:
          description: Services assurés par les services OGC API
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ogcapi_get_landing_page'

  /ogcapi/conformance:
    get:
      tags:
      - OGC API
      summary: Retourne la liste des classes de conformité du service OGC API
      operationId: ogcapi_get_conformance
      parameters:
        - name: f
          required: false
          in: query
          description: format de sortie demandé
          schema:
            type: string
            enum: ['json']
      responses:
        200:
          description: Services assurés par le serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ogcapi_get_conformance'


  /ogcapi/api/all-collections:
    get:
      tags:
      - OGC API
      summary: Récupère la liste des valeurs de collection possibles
      operationId: ogc_get_api_collections
      parameters:
            
        - name: f
          required: false
          in: query
          description: format de sortie demandé
          schema:
            type: string
            enum: ['json']

      responses:
        200:
          description: Liste des valeurs de collection possibles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ogcapi_api_params'

  /ogcapi/api/vectorTiles-collections:
    get:
      tags:
      - OGC API
      summary: Récupère la liste des valeurs de collection tuile vectorielle possibles 
      operationId: ogc_get_api_vectortiles_collections
      parameters:
            
        - name: f
          required: false
          in: query
          description: format de sortie demandé
          schema:
            type: string
            enum: ['json']

      responses:
        200:
          description: Liste des valeurs de collection tuile vectorielle possibles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ogcapi_api_params'


  /ogcapi/api/styles:
    get:
      tags:
      - OGC API
      summary: Récupère la liste des valeurs de style possibles
      operationId: ogc_get_api_styles
      parameters:
            
        - name: f
          required: false
          in: query
          description: format de sortie demandé
          schema:
            type: string
            enum: ['json']

      responses:
        200:
          description: Liste des valeurs de style possibles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ogcapi_api_params'


  /ogcapi/api/tileMatrixSets:
    get:
      tags:
      - OGC API
      summary: Récupère la liste des valeurs de tile matrix set possibles
      operationId: ogc_get_api_tilematrixsets
      parameters:
            
        - name: f
          required: false
          in: query
          description: format de sortie demandé
          schema:
            type: string
            enum: ['json']

      responses:
        200:
          description: Liste des valeurs de tile matrix set possibles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ogcapi_api_params'


  /ogcapi/tileMatrixSets:
    get:
      tags:
      - OGC API
      summary: Récupère la liste des tile matrix sets disponibles
      operationId: ogc_get_tilematrixsets
      parameters:
            
        - name: f
          required: false
          in: query
          description: format de sortie demandé
          schema:
            type: string
            enum: ['json']

      responses:
        200:
          description: Liste des tile matrix sets disponibles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ogcapi_tilematrixsets'
    
  /ogcapi/tileMatrixSets/{tms}:
    get:
      tags:
      - OGC API
      summary: Récupère les informations sur un tile matrix set
      operationId: ogc_get_tilematrixset
      parameters:

        - name: tms
          required: true
          in: path
          description: tile matrix set demandé
          schema:
            type: string
            
        - name: f
          required: false
          in: query
          description: format de sortie demandé
          schema:
            type: string
            enum: ['json']
  
      responses:
        200:
          description: Définition du TMS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ogcapi_tilematrixset'

  /ogcapi/collections:
    get:
      tags:
      - OGC API
      summary: Récupère la liste des collections disponibles
      operationId: ogcapi_get_collections
      parameters:
        - name: f
          required: false
          in: query
          description: format de sortie demandé
          schema:
            type: string
            enum: ['json']

        - name: bbox
          required: false
          in: query
          description: Seules les collections dont la géométrie intersecte la "bounding box" sont sélectionnées. Le format est east,south,west,north (en CRS84)
          schema:
            type: array
            minItems: 4
            maxItems: 4
            items:
              type: number
              format: double
            example:
              - -5
              - 40
              - 5
              - 50
          explode: false

        # - name: limit
        #   required: false
        #   in: query
        #   description: Limite le nombre de collections
        #   schema:
        #     type: integer
        #     minimum: 1
        #     maximum: 10000
        #     default: 10

      responses:
        200:
          description: Liste des collections disponibles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ogcapi_collections'
        400:
          description: Format demandé invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ogcapi_error'


  /ogcapi/collections/{collection}:
    get:
      tags:
      - OGC API
      summary: Récupère une collection disponible
