        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: subset-crs
        in: query
        description: crs for the specified subset
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: tileMatrixSetId
        in: path
        description: Identifier for a supported TileMatrixSet
        required: true
        schema:
          $ref: "#/components/schemas/tileMatrixSets"
      - name: f
        in: query
